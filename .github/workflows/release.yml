name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@1.96.0

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: WattMail ${{ github.ref_name }}
          releaseBody: Automated build of WattMail ${{ github.ref_name }}.
          releaseDraft: false
          prerelease: false

      - name: Stage and upload portable exe
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ver = (Get-Content 'src-tauri/tauri.conf.json' -Raw | ConvertFrom-Json).version
          $exe = Get-ChildItem 'src-tauri/target/release/*.exe','target/release/*.exe' -File -ErrorAction SilentlyContinue |
                 Where-Object { $_.Name -notlike '*setup*' } |
                 Sort-Object Length -Descending | Select-Object -First 1
          if (-not $exe) { throw 'No portable exe found in target/release' }
          $dest = "WattMail_${ver}_x64-portable.exe"
          Copy-Item $exe.FullName $dest -Force
          Write-Host "Uploading $dest ($([math]::Round($exe.Length/1MB,1)) MB)"
          gh release upload $env:GITHUB_REF_NAME $dest --clobber --repo $env:GITHUB_REPOSITORY
