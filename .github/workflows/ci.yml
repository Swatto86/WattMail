name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Pinned to match rust-toolchain.toml so CI and local never drift.
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      # Produces dist/, which the Tauri crate's generate_context! embeds (needed
      # before clippy compiles the presentation crate).
      - name: Build frontend
        run: npm run build

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # Full bundle (runs beforeBuildCommand + release build + installer), so a
      # broken bundle can't ship green.
      - name: Tauri build
        run: npm run tauri build
