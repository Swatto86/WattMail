name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # Pinned to match rust-toolchain.toml so CI and local never drift.
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      # Produces dist/, which the Tauri crate's generate_context! embeds (needed
      # before clippy compiles the presentation crate).
      - name: Build frontend
        run: npm run build

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # Full bundle (runs beforeBuildCommand + release build + installer), so a
      # broken bundle can't ship green. Skipped on release commits (marked
      # "[release]"), where release.yml does the full build + publish — no point
      # paying for it twice. fmt/clippy/frontend above still run.
      - name: Tauri build
        if: ${{ !contains(github.event.head_commit.message, '[release]') }}
        # `createUpdaterArtifacts: true` makes the bundler sign the installer, so
        # the signing key must be present or the build fails after producing the
        # bundle ("public key found, but no private key"). Mirror release.yml.
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm run tauri build

  # WattMail ships Windows-first, but the codebase is cross-platform. This job
  # compiles the macOS/Linux code paths — the `cfg(not(windows))` branches and
  # the apple-native / sync-secret-service keyring backends — so platform gating
  # can't silently rot behind the Windows-only release build above. Clippy, not a
  # full bundle: it exercises the gates without the cost/system-deps of packaging.
  cross-check:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # Tauri's Linux build needs the system webkit/gtk/appindicator libraries to
      # compile; macOS needs none.
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      # generate_context! embeds dist/, so it must exist before clippy compiles
      # the presentation crate.
      - name: Build frontend
        run: npm run build

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
